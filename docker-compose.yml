services:
  demo-xtream:
    build: .
    restart: unless-stopped
    environment:
      PORT: "3000"
      # URL publique affichée côté API (optionnel, sinon déduit des requêtes)
      # PUBLIC_BASE_URL: "https://iptv-demo.tondomaine.fr"
    volumes:
      # Persistance : édite ce fichier sur le serveur pour ajouter films / séries / chaînes
      - demo-xtream-data:/app/data
    ports:
      - "3000:3000"
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  demo-xtream-data:
